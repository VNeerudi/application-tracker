name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application-tracker-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: application-tracker-main/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Sanity check imports
        run: python -c "import fastapi, uvicorn, sqlalchemy, pydantic"

      - name: Compile backend
        run: python -m compileall -q backend

  frontend:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application-tracker-main/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: application-tracker-main/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
